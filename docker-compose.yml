services:
  db:
    image: postgres:15-alpine
    container_name: ooh_postgres_db
    environment:
      - POSTGRES_DB=ooh_reports
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ooh_reports"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: ooh_streamlit_app
    ports:
      - "8501:8501"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ooh_reports
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    restart: always

volumes:
  postgres_data:
